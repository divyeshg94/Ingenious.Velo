name: CD - Dev

on:
  push:
    branches: [main]

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build API
        run: dotnet publish src/Velo.Api/Velo.Api.csproj -c Release -o ./publish/api

      # - name: Deploy to Azure Container Apps (API)
        # run: echo "TODO: az containerapp update ..."
