name: CI
permissions:
  contents: read

on:
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore .NET dependencies
        run: dotnet restore Velo.sln

      - name: Build .NET solution
        run: dotnet build Velo.sln --no-restore --configuration Release

      - name: Run .NET tests
        run: dotnet test Velo.sln --no-build --configuration Release

      - name: Install extension dependencies
        working-directory: src/Velo.Extension
        run: npm ci

      - name: Lint extension
        working-directory: src/Velo.Extension
        run: npm run lint

      - name: Build extension
        working-directory: src/Velo.Extension
        run: npm run build

      - name: Install tfx-cli
        run: npm install -g tfx-cli

      - name: Package and validate extension
        working-directory: src/Velo.Extension
        run: tfx extension create --manifest-globs vss-extension.json --output-path /tmp/velo-ext --no-prompt
