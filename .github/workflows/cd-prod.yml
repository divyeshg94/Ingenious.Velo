name: CD - Production
permissions:
  contents: read

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build API
        run: dotnet publish src/Velo.Api/Velo.Api.csproj -c Release -o ./publish/api

      # - name: Deploy to Azure Container Apps (API)
        # run: echo "TODO: az containerapp update ..."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install tfx-cli
        run: npm install -g tfx-cli

      - name: Build Extension
        working-directory: src/Velo.Extension
        run: |
          npm ci
          npm run build --if-present

      - name: Package and publish ADO Extension
        working-directory: src/Velo.Extension
        run: |
          tfx extension publish \
            --token ${{ secrets.MARKETPLACE_PAT }} \
            --galleryFlags Public \
            --no-prompt
        env:
          MARKETPLACE_PAT: ${{ secrets.MARKETPLACE_PAT }}
