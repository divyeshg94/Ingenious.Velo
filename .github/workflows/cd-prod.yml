name: CD - Production
permissions:
  contents: read

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build API
        run: dotnet publish src/Velo.Api/Velo.Api.csproj -c Release -o ./publish/api

      # - name: Deploy to Azure Container Apps (API)
